    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #e0e0e0; padding: 20px; }
        
        .crossword-container {
            position: relative; width: 700px; height: 990px;
            background-image: url('krzyzowka2.jpg.jpg'); 
            background-size: 100% 100%; background-repeat: no-repeat; background-color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        .cell {
            position: absolute; width: 31px; height: 32px; text-align: center;
            font-size: 18px; font-weight: bold; text-transform: uppercase;
            border: 1px solid #999; background: rgba(255,255,255,0.7); outline: none;
            transition: all 0.3s;
        }

        /* Styl żółty */
        .cell.yellow, .cell.final { border: 2px solid #f1c40f; background: rgba(241, 196, 15, 0.1); }
        
        /* Kolory sprawdzenia */
        .cell.correct { background: #2ecc71 !important; color: white; border-color: #27ae60; transform: scale(1.05); }
        .cell.wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        .controls { margin-top: 25px; display: flex; gap: 15px; }
        
        button { 
            padding: 12px 25px; font-size: 16px; font-weight: bold; cursor: pointer; 
            background: #2c3e50; color: white; border: none; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.2s;
        }
        button:hover { background: #34495e; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        /* Okienko gratulacji */
        #win-message {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 15px; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 1000; border: 3px solid #2ecc71;
        }
        #win-message h2 { color: #27ae60; margin-top: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; }

        .info { background: #333; color: white; padding: 12px 20px; margin-bottom: 15px; border-radius: 30px; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>

    <div class="controls">
        <button onclick="checkResult()">Sprawdź wynik</button>
        <button onclick="location.reload()" style="background:#7f8c8d;">Resetuj grę</button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="win-message">
        <h2>🎉 GRATULACJE! 🎉</h2>
        <p>Rozwiązałeś krzyżówkę bezbłędnie!</p>
        <p>Hasło: <b>ODKRYWANIE</b></p>
        <button onclick="location.reload()">Zagraj jeszcze raz</button>
    </div>

    <script>
        const inputs = Array.from(document.querySelectorAll('.cell:not([readonly])'));

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const val = e.target.value.toUpperCase();
                e.target.value = val;
                e.target.classList.remove('correct', 'wrong');

                if (e.target.id && e.target.id.startsWith('h')) {
                    const target = document.getElementById('target-' + e.target.id);
                    if (target) target.value = val;
                }

                if (val.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && input.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function checkResult() {
            const allCells = document.querySelectorAll('.cell');
            let allCorrect = true;

            allCells.forEach(cell => {
                const userVal = cell.value.toUpperCase();
                const correctVal = cell.getAttribute('data-ans');

                if (userVal === correctVal) {
                    cell.classList.add('correct');
                    cell.classList.remove('wrong');
                } else {
                    cell.classList.add('wrong');
                    cell.classList.remove('correct');
                    allCorrect = false;
                }
            });

            if (allCorrect) {
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('win-message').style.display = 'block';
            }
        }
    </script>
